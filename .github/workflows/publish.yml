name: MK4 - Publish Extension

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run compile

      - run: npm test --if-present

      - run: npx @vscode/vsce package

      - name: Publish Marketplace
        run: npx @vscode/vsce publish --pat ${{ secrets.VSCE_PAT }}